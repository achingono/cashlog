name: Scheduled Scan

on:
  schedule:
    - cron: "0 10 * * 0"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 120s

    env:
      SONAR_HOST_URL: http://localhost:9000
      SONAR_PROJECT_KEY: achingono_money
      SONAR_PROJECT_NAME: money

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Make Sonar scripts executable
        run: chmod +x scripts/sonar/*.sh

      - name: Run comprehensive SonarQube scan
        run: scripts/sonar/run-scan.sh

      - name: Create PRDs from discovered issue clusters
        run: scripts/sonar/generate-prds.sh .sonar/issues.json docs

      - name: Upload Sonar results artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scan-results
          path: |
            .sonar/issues.json
            docs/sonar-prds

      - name: Create PR with generated PRDs
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update SonarQube PRDs"
          title: "docs: update SonarQube PRDs"
          body: |
            Automated SonarQube scan findings grouped into PRDs.
          branch: chore/sonar-prds
          delete-branch: true
          add-paths: |
            docs/sonar-prds
